name: savetune_mobile
description: SaveTune Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.38
  audio_service: ^0.18.13
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  cached_network_image: ^3.3.0
  fl_chart: ^0.67.0
  lottie: ^3.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  web_socket_channel: ^2.4.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  freezed: any
  json_serializable: any

flutter:
  uses-material-design: true
  assets:
    - assets/
